<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPitch - Ultimate Email Generator</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="YbR35spI9vpi4s8XbpbwFDhWj-FNTmuVmYDvlikBgX4" />
</head>
<body>
    <div class="container">
        <header>
            <h1>✉️ QuickPitch</h1>
            <p>Instant, perfectly structured emails for internships, creative work, and school life.</p>
        </header>

        <main>
            <section class="form-section">
                <div class="input-group">
    <label for="yourName">Your Name (Sender)</label>
    <input type="text" id="yourName" placeholder="Enter your full name">
</div>
                
                <div class="input-group-row">
                    <div class="input-group" style="flex: 1; min-width: 120px;">
                        <label for="titlePrefix">Title Prefix</label>
                        <select id="titlePrefix">
                            <option value="">None (Casual)</option>
                            <option value="Mr. ">Mr.</option>
                            <option value="Ms. ">Ms.</option>
                            <option value="Dr. ">Dr.</option>
                            <option value="Professor ">Prof.</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex: 2; min-width: 200px;">
                        <label for="recipientName">Recipient Name</label>
                        <input type="text" id="recipientName" placeholder="e.g. Smith / Hiring Manager / Teacher">
                    </div>
                </div>

                <div class="input-group">
                    <label for="companyName">Company / School Name</label>
                    <input type="text" id="companyName" placeholder="e.g. Honeywell, Siemens, Endeavour Academy">
                </div>

                <div class="input-group">
                    <label for="roleType">Select Email Type</label>
                    <select id="roleType">
                        <optgroup label="💼 Internships & Tech Pitches">
                            <option value="intern_firealarm">🔥 Fire Alarm / Systems Internship</option>
                            <option value="intern_dev">💻 Frontend Dev Internship</option>
                            <option value="intern_uiux">🎨 UI/UX Design Internship</option>
                            <option value="intern_writer">✍️ Content Writer Internship</option>
                            <option value="intern_video">🎬 Video Editor / Creator Pitch</option>
                        </optgroup>
                        <optgroup label="🎨 Project Workflows">
                            <option value="work_delivery">📦 Asset / Project Delivery</option>
                            <option value="work_feedback">💬 Feedback & Revision Request</option>
                        </optgroup>
                        <optgroup label="🏫 School & Everyday Professional">
                            <option value="school_extension">⏳ Assignment Extension Request</option>
                            <option value="school_leave">🤒 Sick Leave / Absence Notice</option>
                            <option value="everyday_followup">🔄 Quick Project Follow-Up</option>
                            <option value="everyday_thankyou">🤝 Post-Interview / Meeting Thank You</option>
                        </optgroup>
                    </select>
                </div>

                <div class="input-group">
                    <label for="emailTone">Email Tone</label>
                    <select id="emailTone">
                        <option value="formal">💼 Formal / Professional</option>
                        <option value="creative">✨ Enthusiastic / Creative</option>
                        <option value="casual">☕ Casual / Direct</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="contextName">Context / Subject Detail</label>
                    <input type="text" id="contextName" placeholder="e.g. Computer Science Project, Canva, Web Design">
                </div>

                <div class="input-group">
                    <label for="projectLink">Project / Portfolio Link (Optional)</label>
                    <input type="text" id="projectLink" placeholder="e.g. Paste GitHub repo, Figma, or Google Drive link">
                </div>

                <button id="generateBtn">Generate Perfect Email ✨</button>
            </section>

            <section class="preview-section">
                <div id="emailOutput" class="email-box">
                    Fill out the boxes above and click generate to see your flawlessly formatted email!
                </div>
                <button id="copyBtn" class="secondary-btn">Copy to Clipboard 📋</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
